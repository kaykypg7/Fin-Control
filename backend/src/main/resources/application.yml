spring:
  application:
    name: gastos-app-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gastos_app}
    username: ${DB_USERNAME:gastos_app}
    password: ${DB_PASSWORD:gastos_app}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Supabase cria alguns objetos proprios no schema "public" por padrao, entao o schema
    # nunca esta 100% vazio quando o Flyway conecta pela primeira vez. baseline-version=0
    # garante que V1/V2 rodem por completo mesmo assim (o default do Flyway seria pular
    # tudo <= versao 1, o que pularia justamente a criacao do nosso schema).
    baseline-on-migrate: true
    baseline-version: "0"

jwt:
  secret: ${JWT_SECRET:change-me-please-this-secret-must-be-at-least-32-bytes-long}
  expiration-ms: 86400000

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

server:
  port: ${PORT:8080}
