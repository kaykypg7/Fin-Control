spring:
  datasource:
    url: jdbc:h2:mem:gastos_app_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: test-secret-key-for-jwt-signing-in-tests-only-32bytes-min
  expiration-ms: 3600000
